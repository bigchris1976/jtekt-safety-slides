<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTEKT Safety Slides</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slideshow-container">
        <div class="slides-wrapper">
            <img class="slide" src="https://via.placeholder.com/1280x720/1e3a8a/ffffff?text=Safety+Slide+1" alt="Slide 1">
            <img class="slide" src="https://via.placeholder.com/1280x720/059669/ffffff?text=Safety+Slide+2" alt="Slide 2">
            <img class="slide" src="https://via.placeholder.com/1280x720/d97706/ffffff?text=Safety+Slide+3" alt="Slide 3">
            <img class="slide" src="https://via.placeholder.com/1280x720/7c3aed/ffffff?text=Safety+Slide+4" alt="Slide 4">
            <img class="slide" src="https://via.placeholder.com/1280x720/dc2626/ffffff?text=Safety+Slide+5" alt="Slide 5">
        </div>
        
        <div class="controls">
            <button id="prevBtn" class="control-btn prev-btn">&#10094;</button>
            <button id="nextBtn" class="control-btn next-btn">&#10095;</button>
        </div>
        
        <div class="slide-counter">
            <span id="slideNumber">1</span> / <span id="totalSlides">5</span>
        </div>
        
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
