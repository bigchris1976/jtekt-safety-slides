<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTEKT Safety Slides</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slideshow-container">
        <div class="slides-wrapper">
            <img class="slide" src="slide1.jpg" alt="Safety Slide 1">
            <img class="slide" src="slide2.jpg" alt="Safety Slide 2">
            <img class="slide" src="slide3.jpg" alt="Safety Slide 3">
            <img class="slide" src="slide4.jpg" alt="Safety Slide 4">
            <img class="slide" src="slide5.png" alt="Safety Slide 5">
            <img class="slide" src="slide6.jpg" alt="Safety Slide 6">
        </div>
        
        <div class="controls">
            <button id="prevBtn" class="control-btn prev-btn">&#10094;</button>
            <button id="nextBtn" class="control-btn next-btn">&#10095;</button>
        </div>
        
        <div class="slide-counter">
            <span id="slideNumber">1</span> / <span id="totalSlides">6</span>
        </div>
        
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
